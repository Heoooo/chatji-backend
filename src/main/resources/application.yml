spring:
  application:
    name: chatji
  config:
    import: optional:classpath:application-secret.yml
  
  # 기본 프로필: 로컬 (Caffeine 사용)
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: update # 실전 모드: 데이터 유지

# 공통 설정 (어떤 환경에서도 사용)
naver:
  openapi:
    url: https://openapi.naver.com/v1/search/shop.json
    # v30.4: 환경 변수가 있으면 그것을 사용하고, 없으면 application-secret.yml을 참조합니다.
    client-id: ${NAVER_CLIENT_ID:}
    client-secret: ${NAVER_CLIENT_SECRET:}

resilience4j:
  circuitbreaker:
    instances:
      productSearch:
        registerHealthIndicator: true
        slidingWindowSize: 20          # 20번의 호출을 기준으로 판단
        minimumNumberOfCalls: 5
        failureRateThreshold: 80      # 80% 실패 시 회로 차단 (더 널널하게)
        waitDurationInOpenState: 2s   # 2초 뒤에 다시 시도 (빠른 복구)
        permittedNumberOfCallsInHalfOpenState: 5
        slidingWindowType: COUNT_BASED

---

# 로컬 환경 설정 (local)
spring:
  config:
    activate:
      on-profile: local
  cache:
    type: caffeine
  caffeine:
    spec: maximumSize=1000,expireAfterWrite=10m

---

